services:
  bot-rust:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: yiffy_corner_bot_rust
    restart: always
    environment:
      YCB_ENV: ${YCB_ENV:-production}
      RUST_LOG: ${RUST_LOG:-info,teloxide=warn}
    volumes:
      # Secrets (token.txt, e621 credentials, FA cookies) + sqlite storage.
      - ./config/vault:/app/config/vault
